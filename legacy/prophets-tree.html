<title>شجرة الأنبياء | The Prophets' Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#D4A853;--gold-l:#F0D68A;--gold-d:#8B7332;--deep:#0A1628;--panel:rgba(12,24,50,.96);--text:#E8E0D0;--dim:#7888A0;--green:#2D8B6E;--green-l:#5DC9A3;--blue:#3A6FA0;--blue-l:#8BB8E8;--line:rgba(212,168,83,.25)}
html{scroll-behavior:smooth}
body{background:var(--deep);color:var(--text);font-family:'Noto Naskh Arabic','Amiri',serif;overflow-x:hidden;min-height:100dvh}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.hdr{position:relative;z-index:10;text-align:center;padding:max(env(safe-area-inset-top),16px) 16px 10px}
.hdr .bsm{font-family:'Scheherazade New',serif;font-size:clamp(1rem,3vw,1.4rem);color:var(--gold-d);opacity:.7;margin-bottom:4px}
.hdr h1{font-family:'Scheherazade New',serif;font-size:clamp(1.7rem,5.5vw,3rem);font-weight:700;color:var(--gold);text-shadow:0 0 25px rgba(212,168,83,.2);line-height:1.3}
.hdr .sub{font-size:clamp(.75rem,1.8vw,.95rem);color:var(--dim);margin-top:3px}
.hdr .verse{font-family:'Amiri',serif;font-size:clamp(.7rem,1.6vw,.88rem);color:var(--gold-d);max-width:600px;margin:8px auto 0;line-height:1.9;opacity:.55}
.lang{position:fixed;top:max(env(safe-area-inset-top),6px);left:6px;z-index:99;display:flex;gap:3px;background:var(--panel);border:1px solid rgba(212,168,83,.12);border-radius:20px;padding:3px;backdrop-filter:blur(10px)}
.lang button{padding:4px 10px;border:none;border-radius:16px;cursor:pointer;font-size:.7rem;font-family:'Noto Naskh Arabic',sans-serif;background:transparent;color:var(--dim);transition:.25s}
.lang button.on{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--deep);font-weight:700}
.filters{position:relative;z-index:10;display:flex;justify-content:center;gap:5px;padding:6px 10px;flex-wrap:wrap}
.fb{padding:5px 12px;border:1px solid var(--line);border-radius:16px;background:rgba(15,30,60,.45);color:var(--dim);font-family:'Noto Naskh Arabic',serif;font-size:clamp(.68rem,1.6vw,.78rem);cursor:pointer;transition:.2s;white-space:nowrap}
.fb:hover,.fb.on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,.06)}
.leg{position:relative;z-index:10;display:flex;justify-content:center;gap:12px;padding:4px 10px;flex-wrap:wrap;font-size:clamp(.62rem,1.4vw,.72rem);color:var(--dim)}
.leg span{display:flex;align-items:center;gap:4px}
.ld{width:9px;height:9px;border-radius:50%;border:2px solid;flex-shrink:0}
.tw{position:relative;z-index:5;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;padding:10px 2px 24px}
.tw svg{display:block;margin:0 auto}
.tw svg text{pointer-events:none}
.nd{cursor:pointer}
.nd:active .nc{filter:brightness(1.3)}
@keyframes nI{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.nd{animation:nI .5s backwards}
@keyframes lI{to{opacity:1}}
.tl{stroke:var(--line);stroke-width:1.2;fill:none;opacity:0;animation:lI .7s forwards}
.ov{position:fixed;inset:0;z-index:50;background:rgba(5,10,25,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.ov.v{opacity:1;pointer-events:all}
.dp{position:fixed;z-index:51;background:linear-gradient(170deg,rgba(14,28,56,.99),rgba(8,16,38,.99));border:1px solid rgba(212,168,83,.15);overflow-y:auto;-webkit-overflow-scrolling:touch;transition:transform .4s cubic-bezier(.32,.72,.32,1),opacity .3s;opacity:0;pointer-events:none}
.dp.v{opacity:1;pointer-events:all}
@media(max-width:699px){.dp{bottom:0;left:0;right:0;max-height:88dvh;border-radius:18px 18px 0 0;transform:translateY(100%);padding:0 16px 24px;padding-bottom:max(24px,env(safe-area-inset-bottom))}.dp.v{transform:translateY(0)}.dh{display:block;width:36px;height:4px;border-radius:2px;background:rgba(212,168,83,.25);margin:10px auto 12px}}
@media(min-width:700px){.dp{top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);max-width:520px;width:90%;max-height:84vh;border-radius:18px;padding:30px;box-shadow:0 25px 70px rgba(0,0,0,.5)}.dp.v{transform:translate(-50%,-50%) scale(1)}.dh{display:none}}
.dc{position:absolute;top:10px;left:12px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--dim);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:2}
.dc:hover{border-color:var(--gold);color:var(--gold)}
.dn{font-family:'Scheherazade New',serif;font-size:2.8rem;color:var(--gold);opacity:.1;position:absolute;top:8px;right:18px;line-height:1}
.nm{font-family:'Scheherazade New',serif;font-size:clamp(1.5rem,4.5vw,2rem);color:var(--gold);text-shadow:0 0 20px rgba(212,168,83,.12)}
.en{font-size:.84rem;color:var(--dim);margin-bottom:8px;font-style:italic}
.tg{display:inline-block;padding:2px 9px;border-radius:9px;font-size:.65rem;margin-left:4px;margin-bottom:8px}
.tu{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.2);color:var(--gold-l)}
.tr{background:rgba(45,139,110,.12);border:1px solid rgba(45,139,110,.25);color:var(--green-l)}
.tn{background:rgba(100,140,200,.1);border:1px solid rgba(100,140,200,.2);color:var(--blue-l)}
.sc{margin-top:12px;padding-top:10px;border-top:1px solid rgba(212,168,83,.07)}
.st{font-family:'Amiri',serif;font-size:.74rem;color:var(--gold-d);margin-bottom:5px;letter-spacing:.4px}
.sc p{font-size:clamp(.82rem,2.1vw,.92rem);line-height:1.85}
.qb{background:rgba(212,168,83,.035);border-right:3px solid var(--gold-d);padding:9px 12px;border-radius:0 7px 7px 0;margin-top:6px;font-family:'Amiri',serif;font-size:clamp(.86rem,2.2vw,.98rem);line-height:2;color:var(--gold-l)}
.qr{display:block;font-size:.68rem;color:var(--dim);margin-top:4px;font-family:'Noto Naskh Arabic',serif}
.hb{background:rgba(45,139,110,.04);border-right:3px solid rgba(45,139,110,.35);padding:9px 12px;border-radius:0 7px 7px 0;margin-top:6px;font-size:clamp(.78rem,1.9vw,.88rem);line-height:1.85;color:#B0D4C2}
.hr{display:block;font-size:.66rem;color:var(--dim);margin-top:3px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
@media(max-width:380px){.ig{grid-template-columns:1fr}}
.ib{background:rgba(212,168,83,.025);border:1px solid rgba(212,168,83,.05);border-radius:8px;padding:7px 10px}
.il{font-size:.63rem;color:var(--dim);margin-bottom:1px}
.iv{font-family:'Amiri',serif;font-size:clamp(.78rem,1.9vw,.88rem)}
.ft{position:relative;z-index:10;text-align:center;padding:20px 14px;color:var(--dim);font-size:.65rem;opacity:.45;line-height:1.7}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}
</style>
</head>

<script>
const C=document.getElementById('stars'),X=C.getContext('2d');let SS=[];
function iS(){C.width=innerWidth;C.height=innerHeight;SS=[];for(let i=0;i<140;i++)SS.push({x:Math.random()*C.width,y:Math.random()*C.height,r:Math.random()*1.2+.3,a:Math.random(),s:Math.random()*.004+.002})}
function dS(){X.clearRect(0,0,C.width,C.height);const g=X.createRadialGradient(C.width/2,0,0,C.width/2,0,C.height);g.addColorStop(0,'#0F1E3D');g.addColorStop(.5,'#0A1628');g.addColorStop(1,'#060E1A');X.fillStyle=g;X.fillRect(0,0,C.width,C.height);SS.forEach(s=>{s.a+=s.s;X.beginPath();X.arc(s.x,s.y,s.r,0,6.28);X.fillStyle=`rgba(220,210,190,${.3+.7*Math.abs(Math.sin(s.a))})`;X.fill()});requestAnimationFrame(dS)}
iS();dS();addEventListener('resize',iS);
let lang='ar',filt='all';
const I={ar:{t:'شَجَرَةُ الأَنْبِيَاء',s:'٢٥ نبياً ورسولاً في القرآن الكريم',v:'﴿ إِنَّ اللَّهَ اصْطَفَىٰ آدَمَ وَنُوحًا وَآلَ إِبْرَاهِيمَ وَآلَ عِمْرَانَ عَلَى الْعَالَمِينَ ﴾ آل عمران: ٣٣',all:'الجميع',ua:'أولو العزم',rs:'الرسل',nb:'الأنبياء',bi:'بنو إسرائيل',il:'ذرية إبراهيم',lu:'أولو العزم',lr:'رسول',ln:'نبي',sL:'النسب',sS:'القصة',sQ:'من القرآن',sH:'من الحديث',sI:'معلومات',lP:'القوم',lB:'الكتاب',lM:'المعجزة',lO:'المكان',lE:'ذُكر في القرآن',tm:'مرة'},en:{t:'The Prophets\' Tree',s:'25 Prophets & Messengers in the Quran',v:'"Allah chose Adam, Noah, Abraham\'s family & Imran\'s family above all" — 3:33',all:'All',ua:'Ulul Azm',rs:'Messengers',nb:'Prophets',bi:'Bani Israel',il:'Ibrahim\'s Line',lu:'Ulul Azm',lr:'Messenger',ln:'Prophet',sL:'Lineage',sS:'Story',sQ:'Quran',sH:'Hadith',sI:'Info',lP:'People',lB:'Book',lM:'Miracle',lO:'Location',lE:'Mentions',tm:'times'},fr:{t:'L\'Arbre des Prophètes',s:'25 Prophètes et Messagers dans le Coran',v:'« Allah a élu Adam, Noé, la famille d\'Abraham et d\'Imran » — 3:33',all:'Tous',ua:'Ouloul Azm',rs:'Messagers',nb:'Prophètes',bi:'Bani Israël',il:'Lignée d\'Ibrahim',lu:'Ouloul Azm',lr:'Messager',ln:'Prophète',sL:'Lignée',sS:'Histoire',sQ:'Coran',sH:'Hadith',sI:'Infos',lP:'Peuple',lB:'Écriture',lM:'Miracle',lO:'Lieu',lE:'Mentions',tm:'fois'}};
const P=[
{id:'adam',o:1,n:{ar:'آدم',en:'Adam',fr:'Adam'},t:'nabi',u:0,bi:0,m:25,pp:{ar:'أبو البشرية',en:'Father of Humanity',fr:'Père de l\'Humanité'},lo:{ar:'الجنة ثم الأرض',en:'Paradise then Earth',fr:'Paradis puis Terre'},mi:{ar:'خُلق بيد الله',en:'Created by Allah',fr:'Créé par Allah'},bk:{ar:'صُحُف',en:'Scrolls',fr:'Feuillets'},li:{ar:'أبو البشر جميعاً',en:'Father of all mankind',fr:'Père de l\'humanité'},st:{ar:'أول الأنبياء، خلقه الله من طين ونفخ فيه من روحه، أسكنه الجنة مع حواء ثم أهبطهما إلى الأرض',en:'First prophet, created from clay. Placed in Paradise with Eve, then sent to Earth.',fr:'Premier prophète, créé d\'argile. Placé au Paradis avec Ève.'},q:{ar:'وَعَلَّمَ آدَمَ الْأَسْمَاءَ كُلَّهَا ثُمَّ عَرَضَهُمْ عَلَى الْمَلَائِكَةِ فَقَالَ أَنبِئُونِي بِأَسْمَاءِ هَٰؤُلَاءِ إِن كُنتُمْ صَادِقِينَ',en:'"He taught Adam the names of all things, then showed them to the angels: Tell Me their names, if you are truthful."',fr:'"Il apprit à Adam tous les noms puis les présenta aux anges: Informez-Moi de leurs noms, si vous êtes véridiques."'},qr:{ar:'البقرة: ٣١',en:'2:31',fr:'2:31'},h:{ar:'«كلُّكم لآدمَ وآدمُ من تراب»',en:'"You are all from Adam, and Adam is from dust."',fr:'"Vous descendez d\'Adam, et Adam est de poussière."'},hr:{ar:'أبو داود والترمذي',en:'Abu Dawud & Tirmidhi',fr:'Abu Dawud & Tirmidhi'}},
{id:'idris',o:2,n:{ar:'إدريس',en:'Idris (Enoch)',fr:'Idris'},t:'nabi',u:0,bi:0,m:2,pp:{ar:'قومه',en:'His people',fr:'Son peuple'},lo:{ar:'بابل / مصر',en:'Babylon / Egypt',fr:'Babylone / Égypte'},mi:{ar:'رفعه الله مكاناً علياً',en:'Raised to a high station',fr:'Élevé à un haut rang'},bk:{ar:'صُحُف',en:'Scrolls',fr:'Feuillets'},li:{ar:'من ذرية آدم، أول من خطّ بالقلم',en:'From Adam\'s line, first to write with a pen',fr:'De la lignée d\'Adam, premier à écrire'},st:{ar:'أول من خطّ بالقلم وخاط الثياب، رفعه الله مكاناً علياً',en:'First to write and sew clothing. Raised to a high station.',fr:'Premier à écrire et coudre. Élevé à un haut rang.'},q:{ar:'إِنَّهُ كَانَ صِدِّيقًا نَّبِيًّا ۝ وَرَفَعْنَاهُ مَكَانًا عَلِيًّا',en:'"He was truthful, a prophet. We raised him to a high station."',fr:'"C\'était un véridique. Nous l\'avons élevé."'},qr:{ar:'مريم: ٥٦-٥٧',en:'19:56-57',fr:'19:56-57'},h:{ar:'«وهو أول من خطّ بالقلم» — حديث أبي ذر',en:'"He was the first to write." — Hadith of Abu Dharr',fr:'"Il fut le premier à écrire."'},hr:{ar:'ابن حبان',en:'Ibn Hibban',fr:'Ibn Hibban'}},
{id:'nuh',o:3,n:{ar:'نوح',en:'Noah (Nuh)',fr:'Noé'},t:'rasool',u:1,bi:0,m:43,pp:{ar:'قوم نوح',en:'People of Noah',fr:'Peuple de Noé'},lo:{ar:'العراق',en:'Mesopotamia',fr:'Mésopotamie'},mi:{ar:'الطوفان والسفينة',en:'The Flood & Ark',fr:'Le Déluge et l\'Arche'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'الأب الثاني للبشرية بعد الطوفان',en:'Second father of humanity after the Flood',fr:'Second père de l\'humanité'},st:{ar:'أول الرسل، لبث ٩٥٠ عاماً يدعو قومه، فأمره الله ببناء السفينة وأغرق الكافرين',en:'First messenger. Preached 950 years. Allah sent the Great Flood.',fr:'Premier messager. Prêcha 950 ans. Allah envoya le Déluge.'},q:{ar:'وَقَالَ ارْكَبُوا فِيهَا بِسْمِ اللَّهِ مَجْرَاهَا وَمُرْسَاهَا ۚ إِنَّ رَبِّي لَغَفُورٌ رَّحِيمٌ',en:'"Board it — in the name of Allah is its sailing and anchorage. My Lord is indeed Forgiving and Merciful."',fr:'"Embarquez! Au nom d\'Allah sont sa course et son ancrage. Mon Seigneur est Pardonneur."'},qr:{ar:'هود: ٤١',en:'11:41',fr:'11:41'},h:{ar:'«أنا أولُ الرسل» — نوح يوم القيامة في حديث الشفاعة',en:'"I am the first messenger." — Nuh on the Day of Judgment',fr:'"Je suis le premier messager."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},
{id:'hud',o:4,n:{ar:'هود',en:'Hud',fr:'Houd'},t:'rasool',u:0,bi:0,m:7,pp:{ar:'عاد',en:'\'Ad',fr:'\'Ad'},lo:{ar:'الأحقاف (اليمن)',en:'Al-Ahqaf (Yemen)',fr:'Al-Ahqaf (Yémen)'},mi:{ar:'الريح العقيم',en:'The barren wind',fr:'Le vent destructeur'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'من ذرية سام بن نوح، من الأنبياء العرب',en:'From Shem son of Noah, an Arab prophet',fr:'De Sem, prophète arabe'},st:{ar:'أُرسل إلى عاد العمالقة (إرم ذات العماد)، فكذبوه فأهلكهم الله بريح صرصر سبع ليالٍ وثمانية أيام',en:'Sent to the giants of \'Ad (Iram). Destroyed by 7 nights and 8 days of furious wind.',fr:'Envoyé aux géants de \'Ad. Détruits par un vent violent.'},q:{ar:'أَتَبْنُونَ بِكُلِّ رِيعٍ آيَةً تَعْبَثُونَ ۝ وَتَتَّخِذُونَ مَصَانِعَ لَعَلَّكُمْ تَخْلُدُونَ',en:'"Do you build on every height a monument to amuse? And take for yourselves palaces as if you will live forever?"',fr:'"Bâtissez-vous sur chaque colline un monument? Et édifiez-vous des palais comme si vous étiez éternels?"'},qr:{ar:'الشعراء: ١٢٨-١٢٩',en:'26:128-129',fr:'26:128-129'},h:{ar:'«أربعة من العرب: هود وشعيب وصالح ونبيُّكَ»',en:'"Four are Arab: Hud, Shu\'ayb, Salih, and your prophet."',fr:'"Quatre sont arabes: Hud, Chou\'ayb, Salih et votre prophète."'},hr:{ar:'ابن حبان',en:'Ibn Hibban',fr:'Ibn Hibban'}},
{id:'salih',o:5,n:{ar:'صالح',en:'Salih',fr:'Salih'},t:'rasool',u:0,bi:0,m:9,pp:{ar:'ثمود',en:'Thamud',fr:'Thamoud'},lo:{ar:'الحِجْر',en:'Al-Hijr',fr:'Al-Hijr'},mi:{ar:'الناقة',en:'The She-Camel',fr:'La Chamelle'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'من ذرية سام، من الأنبياء العرب',en:'From Shem, an Arab prophet',fr:'De Sem, prophète arabe'},st:{ar:'أُرسل إلى ثمود الذين نحتوا الجبال بيوتاً، آتاه الله الناقة آيةً فعقروها فأهلكهم',en:'Sent to Thamud who carved mountains. They killed the she-camel and were destroyed.',fr:'Envoyé aux Thamoud. Ils tuèrent la chamelle.'},q:{ar:'وَيَا قَوْمِ هَٰذِهِ نَاقَةُ اللَّهِ لَكُمْ آيَةً فَذَرُوهَا تَأْكُلْ فِي أَرْضِ اللَّهِ وَلَا تَمَسُّوهَا بِسُوءٍ فَيَأْخُذَكُمْ عَذَابٌ قَرِيبٌ',en:'"O my people, this she-camel of Allah is a sign. Let her graze in Allah\'s land, and touch her not with harm lest a near punishment seize you."',fr:'"Ô mon peuple, cette chamelle d\'Allah est un signe. Ne lui faites aucun mal."'},qr:{ar:'هود: ٦٤',en:'11:64',fr:'11:64'},h:{ar:'«لا تدخلوا على هؤلاء المعذَّبين إلا أن تكونوا باكين»',en:'"Do not enter upon these punished unless weeping."',fr:'"N\'entrez pas chez ces punis sauf en pleurant."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},
{id:'ibrahim',o:6,n:{ar:'إبراهيم',en:'Abraham',fr:'Abraham'},t:'rasool',u:1,bi:0,m:69,pp:{ar:'بابل / النمرود',en:'Babylon / Nimrod',fr:'Babylone / Nemrod'},lo:{ar:'العراق، فلسطين، مكة',en:'Iraq, Palestine, Makkah',fr:'Irak, Palestine, Mecque'},mi:{ar:'النار برداً وسلاماً',en:'Fire became cool & safe',fr:'Feu devint fraîcheur'},bk:{ar:'صُحُف',en:'Scrolls',fr:'Feuillets'},li:{ar:'خليل الله وأبو الأنبياء، أبو إسماعيل وإسحاق',en:'Friend of Allah, Father of Prophets',fr:'Ami d\'Allah, Père des Prophètes'},st:{ar:'خليل الرحمن، حطّم الأصنام فألقوه بالنار فجعلها الله برداً وسلاماً، بنى الكعبة مع إسماعيل، ابتُلي بذبح ابنه',en:'Smashed idols, thrown in fire Allah cooled. Built Kaaba. Tested with sacrifice.',fr:'Brisa les idoles. Construisit la Kaaba.'},q:{ar:'قُلْنَا يَا نَارُ كُونِي بَرْدًا وَسَلَامًا عَلَىٰ إِبْرَاهِيمَ ۝ وَأَرَادُوا بِهِ كَيْدًا فَجَعَلْنَاهُمُ الْأَخْسَرِينَ',en:'"We said: O fire, be cool and safe for Ibrahim! They intended a plot but We made them the losers."',fr:'"Nous dîmes: Ô feu, sois fraîcheur et paix pour Ibrahim!"'},qr:{ar:'الأنبياء: ٦٩-٧٠',en:'21:69-70',fr:'21:69-70'},h:{ar:'«إنّ إبراهيم خليلُ الله، وإنّ صاحبَكم خليلُ الله»',en:'"Ibrahim is Allah\'s friend, and your companion is Allah\'s friend."',fr:'"Ibrahim est l\'ami d\'Allah."'},hr:{ar:'رواه مسلم',en:'Muslim',fr:'Muslim'}},
{id:'lut',o:7,n:{ar:'لوط',en:'Lot',fr:'Loth'},t:'rasool',u:0,bi:0,m:27,pp:{ar:'سدوم',en:'Sodom',fr:'Sodome'},lo:{ar:'البحر الميت',en:'Dead Sea',fr:'Mer Morte'},mi:{ar:'قلب المدينة',en:'City overturned',fr:'Ville renversée'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'ابن أخي إبراهيم',en:'Nephew of Ibrahim',fr:'Neveu d\'Ibrahim'},st:{ar:'أُرسل إلى سدوم فكذبوه، فقلب الله مدينتهم وأمطرها حجارة',en:'Sent to Sodom. Allah overturned the city and rained stones.',fr:'Envoyé à Sodome. Allah renversa la ville.'},q:{ar:'رَبِّ نَجِّنِي وَأَهْلِي مِمَّا يَعْمَلُونَ ۝ فَنَجَّيْنَاهُ وَأَهْلَهُ أَجْمَعِينَ',en:'"My Lord, save me and my family from what they do." So We saved him and his family, all together.',fr:'"Seigneur, sauve-moi et ma famille." Nous le sauvâmes avec toute sa famille.'},qr:{ar:'الشعراء: ١٦٩-١٧٠',en:'26:169-170',fr:'26:169-170'},h:{ar:'«رحمة الله على لوط، لقد كان يأوي إلى رُكنٍ شديد»',en:'"Allah\'s mercy on Lot; he leaned on a strong support."',fr:'"La miséricorde d\'Allah sur Lot."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},
{id:'ismail',o:8,n:{ar:'إسماعيل',en:'Ishmael',fr:'Ismaël'},t:'rasool',u:0,bi:0,m:12,pp:{ar:'قبائل العرب',en:'Arabian tribes',fr:'Tribus arabes'},lo:{ar:'مكة',en:'Makkah',fr:'Mecque'},mi:{ar:'زمزم والفداء',en:'Zamzam & saved from sacrifice',fr:'Zamzam et sauvé'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'ابن إبراهيم من هاجر، جدّ النبي ﷺ',en:'Son of Ibrahim, ancestor of Muhammad ﷺ',fr:'Fils d\'Ibrahim, ancêtre de Muhammad ﷺ'},st:{ar:'الذبيح الذي فداه الله، بنى الكعبة مع أبيه، صادق الوعد',en:'Ransomed by Allah. Built Kaaba with father. True to promise.',fr:'Racheté. Construisit la Kaaba. Fidèle.'},q:{ar:'يَا أَبَتِ افْعَلْ مَا تُؤْمَرُ ۖ سَتَجِدُنِي إِن شَاءَ اللَّهُ مِنَ الصَّابِرِينَ',en:'"O my father, do as you are commanded. You will find me, God willing, of the patient."',fr:'"Ô père, fais ce qui t\'est commandé. Tu me trouveras patient, si Allah le veut."'},qr:{ar:'الصافات: ١٠٢',en:'37:102',fr:'37:102'},h:{ar:'«إنَّ اللهَ اصطفى من وَلَدِ إبراهيمَ إسماعيلَ»',en:'"Allah chose Ismail from Ibrahim\'s children."',fr:'"Allah a choisi Ismaïl."'},hr:{ar:'مسلم',en:'Muslim',fr:'Muslim'}},
{id:'ishaq',o:9,n:{ar:'إسحاق',en:'Isaac',fr:'Isaac'},t:'nabi',u:0,bi:0,m:17,pp:{ar:'فلسطين',en:'Palestine',fr:'Palestine'},lo:{ar:'الخليل',en:'Hebron',fr:'Hébron'},mi:{ar:'وُلد من أبوين كبيرين',en:'Born to elderly parents',fr:'Né de parents âgés'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'ابن إبراهيم من سارة، أبو يعقوب',en:'Son of Ibrahim & Sarah. Father of Yaqub.',fr:'Fils d\'Ibrahim et Sarah.'},st:{ar:'بشّرت الملائكة أبويه وهما كبيران، أبو يعقوب وجدّ أنبياء بني إسرائيل',en:'Angels gave tidings. Father of Yaqub, ancestor of Israelite prophets.',fr:'Anges annoncèrent sa naissance.'},q:{ar:'فَبَشَّرْنَاهُ بِغُلَامٍ حَلِيمٍ',en:'"So We gave him glad tidings of a forbearing son."',fr:'"Nous lui annonçâmes un garçon longanime."'},qr:{ar:'الصافات: ١٠١',en:'37:101',fr:'37:101'},h:{ar:'«الكريم ابنُ الكريم ابنِ الكريم ابنِ الكريم: يوسف بن يعقوب بن إسحاق بن إبراهيم»',en:'"The noble son of the noble: Yusuf son of Yaqub son of Ishaq son of Ibrahim."',fr:'"Le noble fils du noble."'},hr:{ar:'البخاري',en:'Bukhari',fr:'Bukhari'}},
{id:'yaqub',o:10,n:{ar:'يعقوب',en:'Jacob',fr:'Jacob'},t:'nabi',u:0,bi:1,m:16,pp:{ar:'بنو إسرائيل',en:'Bani Israel',fr:'Bani Israël'},lo:{ar:'فلسطين ومصر',en:'Palestine & Egypt',fr:'Palestine et Égypte'},mi:{ar:'عاد بصره بعد الحزن',en:'Sight restored',fr:'Vue restaurée'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'إسرائيل، أبو الأسباط الاثني عشر',en:'Israel, Father of 12 Tribes',fr:'Israël, Père des 12 Tribus'},st:{ar:'حزن على يوسف حتى ابيضّت عيناه، ثم ردّ الله بصره بقميص يوسف',en:'Lost sight from grief over Yusuf. Restored by Yusuf\'s shirt.',fr:'Perdit la vue de chagrin. Vue restaurée.'},q:{ar:'إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ وَأَعْلَمُ مِنَ اللَّهِ مَا لَا تَعْلَمُونَ',en:'"I only complain of my grief and sorrow to Allah, and I know from Allah what you do not know."',fr:'"Je ne me plains de ma douleur qu\'à Allah, et je sais d\'Allah ce que vous ne savez pas."'},qr:{ar:'يوسف: ٨٦',en:'12:86',fr:'12:86'},h:{ar:'«الكريم ابنُ الكريم ابنِ الكريم ابنِ الكريم»',en:'"The noble son of the noble son of the noble son of the noble."',fr:'"Le noble fils du noble."'},hr:{ar:'البخاري',en:'Bukhari',fr:'Bukhari'}},
{id:'yusuf',o:11,n:{ar:'يوسف',en:'Joseph',fr:'Joseph'},t:'rasool',u:0,bi:1,m:27,pp:{ar:'مصر',en:'Egypt',fr:'Égypte'},lo:{ar:'فلسطين ومصر',en:'Palestine & Egypt',fr:'Palestine et Égypte'},mi:{ar:'تأويل الأحلام',en:'Dream interpretation',fr:'Interprétation des rêves'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'نبي ابن نبي ابن نبي ابن نبي',en:'Prophet son of prophet son of prophet son of prophet',fr:'Prophète fils de prophète fils de prophète'},st:{ar:'أحسن القصص: ألقاه إخوته في البئر، بِيع عبداً، سُجن ظلماً، ثم صار عزيز مصر',en:'Best of stories. Thrown in well, sold, imprisoned, became Egypt\'s minister.',fr:'La plus belle histoire. Jeté dans un puits.'},q:{ar:'رَبِّ السِّجْنُ أَحَبُّ إِلَيَّ مِمَّا يَدْعُونَنِي إِلَيْهِ ۖ وَإِلَّا تَصْرِفْ عَنِّي كَيْدَهُنَّ أَصْبُ إِلَيْهِنَّ',en:'"My Lord, prison is dearer to me than what they invite me to. Unless You avert their plot, I might incline toward them."',fr:'"Seigneur, la prison m\'est préférable à ce à quoi elles m\'invitent."'},qr:{ar:'يوسف: ٣٣',en:'12:33',fr:'12:33'},h:{ar:'«أُعطيَ يوسفُ شَطرَ الحُسن»',en:'"Yusuf was given half of all beauty."',fr:'"Yusuf reçut la moitié de la beauté."'},hr:{ar:'مسلم',en:'Muslim',fr:'Muslim'}},
{id:'shuayb',o:12,n:{ar:'شعيب',en:'Shu\'ayb',fr:'Chou\'ayb'},t:'rasool',u:0,bi:0,m:11,pp:{ar:'أهل مدين',en:'Midian',fr:'Madian'},lo:{ar:'مدين',en:'Midian',fr:'Madian'},mi:{ar:'يوم الظُّلة',en:'Day of Shadow',fr:'Jour du châtiment'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'من ذرية إبراهيم، خطيب الأنبياء',en:'From Ibrahim\'s line, Orator of Prophets',fr:'De la lignée d\'Ibrahim'},st:{ar:'خطيب الأنبياء، أُرسل إلى مدين الذين بخسوا الميزان',en:'Orator of Prophets. Sent to Midian who cheated measures.',fr:'Orateur des Prophètes. Envoyé à Madian.'},q:{ar:'وَمَا أُرِيدُ أَنْ أُخَالِفَكُمْ إِلَىٰ مَا أَنْهَاكُمْ عَنْهُ ۚ إِنْ أُرِيدُ إِلَّا الْإِصْلَاحَ مَا اسْتَطَعْتُ',en:'"I do not wish to differ from you in what I forbid you. I only intend reform as much as I am able."',fr:'"Je ne veux pas vous contredire. Je ne veux que la réforme autant que je le puis."'},qr:{ar:'هود: ٨٨',en:'11:88',fr:'11:88'},h:{ar:'من الأنبياء العرب الأربعة — حديث أبي ذر',en:'One of four Arab prophets — Abu Dharr',fr:'L\'un des quatre prophètes arabes.'},hr:{ar:'ابن حبان',en:'Ibn Hibban',fr:'Ibn Hibban'}},
{id:'ayyub',o:13,n:{ar:'أيوب',en:'Job',fr:'Job'},t:'nabi',u:0,bi:1,m:4,pp:{ar:'قومه',en:'His people',fr:'Son peuple'},lo:{ar:'حوران',en:'Hauran (Syria)',fr:'Hauran'},mi:{ar:'شفاء بعد بلاء',en:'Healed after affliction',fr:'Guéri après affliction'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'من ذرية إسحاق بن إبراهيم',en:'From Ishaq\'s line',fr:'De la lignée d\'Ishaq'},st:{ar:'مثال الصبر، فقد ماله وولده وصحته فصبر، فردّ الله عافيته ومثلهم معهم',en:'Epitome of patience. Lost everything, restored by Allah and more.',fr:'Exemple de patience. Perdit tout. Allah rendit tout.'},q:{ar:'أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ',en:'"Adversity has touched me, and You are Most Merciful."',fr:'"Le mal m\'a touché."'},qr:{ar:'الأنبياء: ٨٣',en:'21:83',fr:'21:83'},h:{ar:'«بينما أيوب يغتسلُ خرّ عليه رِجلُ جرادٍ من ذهب»',en:'"While Ayyub bathed, golden locusts fell upon him."',fr:'"Des sauterelles d\'or tombèrent sur Ayyub."'},hr:{ar:'البخاري',en:'Bukhari',fr:'Bukhari'}},
{id:'dhulkifl',o:14,n:{ar:'ذو الكفل',en:'Dhul-Kifl',fr:'Dhul-Kifl'},t:'nabi',u:0,bi:1,m:2,pp:{ar:'بنو إسرائيل',en:'Bani Israel',fr:'Bani Israël'},lo:{ar:'الشام',en:'Syria',fr:'Syrie'},mi:{ar:'—',en:'—',fr:'—'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'يُقال ابن أيوب',en:'Said to be son of Ayyub',fr:'Fils d\'Ayyub'},st:{ar:'ذُكر مع الأنبياء الصابرين، تكفّل بعبادة الله',en:'Mentioned among patient prophets.',fr:'Mentionné parmi les prophètes patients.'},q:{ar:'وَإِسْمَاعِيلَ وَإِدْرِيسَ وَذَا الْكِفْلِ ۖ كُلٌّ مِّنَ الصَّابِرِينَ',en:'"Ismail, Idris and Dhul-Kifl — all of the patient."',fr:'"Ismaïl, Idris et Dhul-Kifl — endurants."'},qr:{ar:'الأنبياء: ٨٥',en:'21:85',fr:'21:85'},h:null,hr:null},
{id:'yunus',o:15,n:{ar:'يونس',en:'Jonah',fr:'Jonas'},t:'rasool',u:0,bi:1,m:4,pp:{ar:'نينوى',en:'Nineveh',fr:'Ninive'},lo:{ar:'العراق',en:'Iraq',fr:'Irak'},mi:{ar:'نجاه من الحوت',en:'Saved from whale',fr:'Sauvé de la baleine'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'صاحب الحوت، من ذرية يعقوب',en:'Companion of the Whale, from Yaqub\'s line',fr:'Compagnon de la Baleine'},st:{ar:'غادر قومه غاضباً، التقمه الحوت، نادى في الظلمات فنجّاه الله',en:'Left angry, swallowed by whale, called upon Allah in darkness, saved.',fr:'Avalé par une baleine, invoqua Allah, sauvé.'},q:{ar:'لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ',en:'"No deity except You. I was of the wrongdoers."',fr:'"Point de divinité à part Toi!"'},qr:{ar:'الأنبياء: ٨٧',en:'21:87',fr:'21:87'},h:{ar:'«لا ينبغي لعبدٍ أن يقول: أنا خيرٌ من يونس بن متّى»',en:'"No one should say: I am better than Yunus."',fr:'"Personne ne devrait dire: Je suis meilleur que Yunus."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},
{id:'musa',o:16,n:{ar:'موسى',en:'Moses',fr:'Moïse'},t:'rasool',u:1,bi:1,m:136,pp:{ar:'فرعون وبنو إسرائيل',en:'Pharaoh & Bani Israel',fr:'Pharaon et Bani Israël'},lo:{ar:'مصر وسيناء',en:'Egypt & Sinai',fr:'Égypte et Sinaï'},mi:{ar:'العصا، اليد، شقّ البحر',en:'Staff, Hand, Parting Sea',fr:'Bâton, Main, Mer'},bk:{ar:'التوراة',en:'Torah',fr:'Torah'},li:{ar:'كليم الله، من بني إسرائيل',en:'Spoke with Allah, from Bani Israel',fr:'Interlocuteur d\'Allah'},st:{ar:'كليم الله وأكثر الأنبياء ذكراً (١٣٦ مرة)، أُلقي في اليمّ رضيعاً، أُرسل بتسع آيات لفرعون، شقّ البحر',en:'Spoke with Allah. Most mentioned (136 times). Parted the sea. Received Torah.',fr:'Parla avec Allah. Plus mentionné (136). Fendit la Mer.'},q:{ar:'رَبِّ اشْرَحْ لِي صَدْرِي ۝ وَيَسِّرْ لِي أَمْرِي ۝ وَاحْلُلْ عُقْدَةً مِّن لِّسَانِي ۝ يَفْقَهُوا قَوْلِي',en:'"My Lord, expand my chest, ease my task, and untie the knot from my tongue, that they may understand my speech."',fr:'"Seigneur, ouvre-moi ma poitrine, facilite ma mission, et dénoue un nœud de ma langue."'},qr:{ar:'طه: ٢٥-٢٨',en:'20:25-28',fr:'20:25-28'},h:{ar:'«رأيتُ موسى ليلة أُسريَ بي، رجلٌ آدمُ طُوالٌ»',en:'"I saw Musa on the Night Journey — a tall, brown man."',fr:'"J\'ai vu Musa lors du Voyage Nocturne."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},
{id:'harun',o:17,n:{ar:'هارون',en:'Aaron',fr:'Aaron'},t:'nabi',u:0,bi:1,m:20,pp:{ar:'بنو إسرائيل',en:'Bani Israel',fr:'Bani Israël'},lo:{ar:'مصر وسيناء',en:'Egypt & Sinai',fr:'Égypte et Sinaï'},mi:{ar:'أعان موسى',en:'Aided Musa',fr:'Aida Musa'},bk:{ar:'—',en:'—',fr:'—'},li:{ar:'أخو موسى الأكبر',en:'Elder brother of Musa',fr:'Frère de Musa'},st:{ar:'وزير موسى وأفصح لساناً، طلبه موسى من ربه فاستجاب',en:'Musa\'s minister. More eloquent. Sent by Allah\'s grant.',fr:'Ministre de Musa. Plus éloquent.'},q:{ar:'هُوَ أَفْصَحُ مِنِّي لِسَانًا فَأَرْسِلْهُ مَعِيَ',en:'"He is more fluent, so send him with me."',fr:'"Il est plus éloquent, envoie-le."'},qr:{ar:'القصص: ٣٤',en:'28:34',fr:'28:34'},h:{ar:'«أنتَ مني بمنزلة هارون من موسى» — لعليّ',en:'"You are to me as Harun was to Musa." — To Ali',fr:'"Tu es pour moi comme Harun pour Musa."'},hr:{ar:'متفق عليه',en:'Bukhari & Muslim',fr:'Bukhari & Muslim'}},

function co(p){if(p.u)return{s:'#F0D68A',g:'rgba(212,168,83,.3)'};if(p.t==='rasool')return{s:'#5DC9A3',g:'rgba(45,139,110,.2)'};return{s:'#8BB8E8',g:'rgba(100,160,220,.2)'}}
// sh returns 2=primary match, 1=ancestor/connector, 0=hide
function sh(p){
  if(filt==='all')return 2;
  let match=false;
  if(filt==='ua')match=p.u;
  else if(filt==='rs')match=p.t==='rasool';
  else if(filt==='nb')match=p.t==='nabi';
  else if(filt==='bi')match=p.bi;
  else if(filt==='il')match=!['adam','idris','nuh','hud','salih','lut'].includes(p.id);
  if(match)return 2;
  return 0;
}
// Find all ancestors needed to connect matched nodes
function getVisible(){
  const matched=new Set(P.filter(p=>sh(p)===2).map(p=>p.id));
  const needed=new Set(matched);
  // For each matched node, trace ancestors up via connections
  const parentMap={};
  CN.forEach(([a,b])=>{parentMap[b]=a});
  matched.forEach(id=>{
    let cur=parentMap[id];
    while(cur){needed.add(cur);cur=parentMap[cur]}
  });
  return needed;
}
function ren(){const t=I[lang],mob=innerWidth<700,cW=mob?72:100,rH=mob?88:110,nR=mob?22:32;

let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs><filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><radialGradient id="gU"><stop offset="0%" stop-color="#3D2800"/><stop offset="100%" stop-color="#1A1200"/></radialGradient><radialGradient id="gR"><stop offset="0%" stop-color="#0A2D20"/><stop offset="100%" stop-color="#051510"/></radialGradient><radialGradient id="gN"><stop offset="0%" stop-color="#0A1E35"/><stop offset="100%" stop-color="#05101A"/></radialGradient></defs>`;
CN.forEach(([a,b],i)=>{if(!vis.has(a)||!vis.has(b))return;const pa=ps(a),pb=ps(b),my=(pa.y+pb.y)/2;const dim=filt!=='all'&&(sh(P.find(x=>x.id===a))!==2||sh(P.find(x=>x.id===b))!==2);s+=`<path class="tl" d="M${pa.x},${pa.y+nR} C${pa.x},${my} ${pb.x},${my} ${pb.x},${pb.y-nR}" style="animation-delay:${i*.04}s${dim?';opacity:.15':''}" ${dim?'stroke-dasharray="4 4"':''}/>`});
P.forEach((p,i)=>{if(!vis.has(p.id))return;const primary=sh(p)===2;const dim=filt!=='all'&&!primary;const{x,y}=ps(p.id),c=co(p),gr=p.u?'gU':p.t==='rasool'?'gR':'gN',r=p.u?(mob?26:36):nR,fs=mob?(p.u?11:10):(p.u?15:13);
const op2=dim?'opacity=".25"':'';
s+=`<g class="nd" onclick="op('${p.id}')" style="animation-delay:${i*.05}s" ${op2}><circle cx="${x}" cy="${y}" r="${r+4}" fill="none" stroke="${c.g}" stroke-width="1"/><circle class="nc" cx="${x}" cy="${y}" r="${r}" fill="url(#${gr})" stroke="${c.s}" stroke-width="${p.u?2.5:1.5}" ${dim?'':'filter="url(#g)"'}/>`;
if(p.u&&!dim)s+=`<circle cx="${x}" cy="${y}" r="${r-4}" fill="none" stroke="${c.s}" stroke-width=".5" opacity=".3" stroke-dasharray="3 3"/>`;
s+=`<text x="${x}" y="${y+1}" text-anchor="middle" dominant-baseline="middle" fill="${c.s}" font-size="${fs}" font-weight="700" font-family="'Scheherazade New',serif">${p.n[lang]}</text>`;
s+=`<text x="${x}" y="${y+r+13}" text-anchor="middle" fill="#556677" font-size="${mob?8:9}" font-family="sans-serif">${p.o}</text></g>`});
s+=`</svg>`;document.getElementById('tw').innerHTML=s}
function ui(){const t=I[lang];document.getElementById('tt').textContent=t.t;document.getElementById('ts').textContent=t.s;document.getElementById('tv').textContent=t.v;
document.getElementById('lb').innerHTML=['ar','en','fr'].map(l=>`<button class="${l===lang?'on':''}" onclick="sL('${l}')">${l==='ar'?'العربية':l==='en'?'EN':'FR'}</button>`).join('');
document.getElementById('ff').innerHTML=[['all',t.all],['ua',t.ua],['rs',t.rs],['nb',t.nb],['bi',t.bi],['il',t.il]].map(([k,v])=>`<button class="fb${filt===k?' on':''}" onclick="sF('${k}')">${v}</button>`).join('');

h+=`<div class="sc"><div class="st">${t.sS}</div><p>${p.st[lang]}</p></div>`;
h+=`<div class="sc"><div class="st">${t.sQ}</div><div class="qb">${p.q[lang]}<span class="qr">${p.qr[lang]}</span></div></div>`;
if(p.h)h+=`<div class="sc"><div class="st">${t.sH}</div><div class="hb">${p.h[lang]}<span class="hr">${p.hr[lang]}</span></div></div>`;
h+=`<div class="sc"><div class="st">${t.sI}</div><div class="ig"><div class="ib"><div class="il">${t.lP}</div><div class="iv">${p.pp[lang]}</div></div><div class="ib"><div class="il">${t.lO}</div><div class="iv">${p.lo[lang]}</div></div><div class="ib"><div class="il">${p.bk[lang]!=='—'?t.lB:t.lM}</div><div class="iv">${p.bk[lang]!=='—'?p.bk[lang]:p.mi[lang]}</div></div><div class="ib"><div class="il">${t.lE}</div><div class="iv">${p.m} ${t.tm}</div></div></div></div>`;
document.getElementById('dp').innerHTML=h;document.getElementById('ov').classList.add('v');document.getElementById('dp').classList.add('v');document.body.style.overflow='hidden'}
function cl(){document.getElementById('ov').classList.remove('v');document.getElementById('dp').classList.remove('v');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cl()});
let ty=0;document.getElementById('dp').addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:1});
document.getElementById('dp').addEventListener('touchmove',e=>{if(document.getElementById('dp').scrollTop===0&&e.touches[0].clientY-ty>50)cl()},{passive:1});
ui();ren();addEventListener('resize',ren);
</script>
</body>
</html>
